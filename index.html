<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Auto Insurance Quote</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: Arial, sans-serif;
    background-color: #f0f4f8;
    color: #333;
  }

  h1 {
    background-color: #005f73;
    color: white;
    padding: 24px 32px;
    font-size: 26px;
  }

  #progressText {
    background-color: #0a9396;
    color: white;
    padding: 10px 32px;
    font-size: 14px;
    letter-spacing: 1px;
  }

  form {
    max-width: 620px;
    margin: 40px auto;
    background: white;
    border-radius: 10px;
    padding: 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  h2 {
    color: #005f73;
    margin-bottom: 20px;
    margin-top: 10px;
    border-bottom: 2px solid #e0f0f1;
    padding-bottom: 8px;
  }

  label {
    display: block;
    font-weight: bold;
    margin-bottom: 6px;
    font-size: 14px;
    color: #444;
  }

  input, select {
    width: 100%;
    padding: 12px;
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 6px;
    font-size: 15px;
    color: #333;
  }

  input:focus, select:focus {
    outline: none;
    border-color: #0a9396;
    box-shadow: 0 0 0 3px rgba(10,147,150,0.15);
  }

  button {
    padding: 13px 28px;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    cursor: pointer;
    font-weight: bold;
  }

  button[onclick*="goToStep(1)"],
  button[onclick*="goToStep(2)"],
  button[onclick*="goToStep(3)"] {
    background-color: #e0e0e0;
    color: #333;
    margin-right: 10px;
  }

  button[onclick*="goToStep(2)"][id],
  button:last-child {
    background-color: #005f73;
    color: white;
  }

  button[onclick="calculateQuote()"] {
    background-color: #005f73;
    color: white;
  }

  #result {
    max-width: 620px;
    margin: 20px auto 60px;
    background: white;
    border-radius: 10px;
    padding: 36px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.1);
  }

  #result h2 { color: #005f73; margin-bottom: 16px; }
  #result p { margin-bottom: 10px; font-size: 16px; line-height: 1.6; }
</style>  </head>
  <body>

    <h1>Get Your Auto Insurance Quote</h1>

    <!-- Progress indicator -->
    <p id="progressText">Step 1 of 4 — Getting Started</p>

    <form id="quoteForm">

      <!-- ===== STEP 1: GETTING STARTED ===== -->
      <div id="step1">
        <h2>Tell us about yourself</h2>

        <label>First Name</label>
        <input type="text" id="firstName" placeholder="First Name" /><br /><br />

        <label>Last Name</label>
        <input type="text" id="lastName" placeholder="Last Name" /><br /><br />

        <label>Suffix</label>
        <select id="suffix">
          <option value="">None</option>
          <option value="jr">Jr.</option>
          <option value="sr">Sr.</option>
          <option value="ii">II</option>
          <option value="iii">III</option>
        </select><br /><br />

        <label>Date of Birth</label>
        <input type="date" id="dob" /><br /><br />

        <h2>Where do you live?</h2>

        <label>ZIP Code</label>
        <input type="text" id="zip" placeholder="23225" maxlength="5" /><br /><br />

        <label>Street Address</label>
        <input type="text" id="address" placeholder="123 Main St" /><br /><br />

        <label>Apt / Unit (optional)</label>
        <input type="text" id="apt" placeholder="Apt 4B" /><br /><br />

        <label>Do you:</label><br />
        <select id="homeType">
          <option value="">-- Select --</option>
          <option value="own">Own Home</option>
          <option value="rent">Rent</option>
          <option value="condo">Own Condo</option>
          <option value="mobile">Own Mobile Home</option>
          <option value="parents">Live with Parents / Other</option>
        </select><br /><br />

        <label>When did you move in?</label><br />
        <select id="moveMonth">
          <option value="">Month</option>
          <option value="1">January</option>
          <option value="2">February</option>
          <option value="3">March</option>
          <option value="4">April</option>
          <option value="5">May</option>
          <option value="6">June</option>
          <option value="7">July</option>
          <option value="8">August</option>
          <option value="9">September</option>
          <option value="10">October</option>
          <option value="11">November</option>
          <option value="12">December</option>
        </select>
        <select id="moveYear">
          <option value="">Year</option>
          <option value="2024">2024</option>
          <option value="2023">2023</option>
          <option value="2022">2022</option>
          <option value="2021">2021</option>
          <option value="2020">2020</option>
          <option value="2019">2019</option>
          <option value="2018">2018</option>
          <option value="2015">2015</option>
          <option value="2010">2010</option>
          <option value="2005">2005</option>
          <option value="2000">2000</option>
        </select><br /><br />

        <button type="button" onclick="goToStep(2)">Save and Continue →</button>
      </div>

      <!-- ===== STEP 2: VEHICLES ===== -->
      <div id="step2" style="display:none;">
        <h2>Tell us about your vehicle</h2>

        <label>Vehicle Year</label>
        <input type="number" id="vehicleYear" placeholder="2020" min="1990" max="2025" /><br /><br />

        <label>Vehicle Make</label>
        <input type="text" id="vehicleMake" placeholder="e.g. Toyota" /><br /><br />

        <label>Vehicle Model</label>
        <input type="text" id="vehicleModel" placeholder="e.g. Camry" /><br /><br />

        <label>Vehicle Trim / Sub-model</label>
        <input type="text" id="vehicleTrim" placeholder="e.g. LE, XLE, SE" /><br /><br />

        <label>Primary Use</label>
        <select id="vehicleUse">
          <option value="">-- Select --</option>
          <option value="commute">Commute to Work/School</option>
          <option value="pleasure">Pleasure / Personal Use</option>
          <option value="business">Business</option>
          <option value="farm">Farm</option>
        </select><br /><br />

        <label>Estimated Annual Mileage</label>
        <select id="annualMileage">
          <option value="">-- Select --</option>
          <option value="5000">Under 5,000</option>
          <option value="7500">5,000 – 7,500</option>
          <option value="10000">7,500 – 10,000</option>
          <option value="12500">10,000 – 12,500</option>
          <option value="15000">12,500 – 15,000</option>
          <option value="20000">15,000 – 20,000</option>
          <option value="25000">Over 20,000</option>
        </select><br /><br />

        <label>Vehicle Ownership</label>
        <select id="vehicleOwnership">
          <option value="">-- Select --</option>
          <option value="own">Own (paid off)</option>
          <option value="finance">Financing</option>
          <option value="lease">Leasing</option>
        </select><br /><br />

        <label>Anti-theft device installed?</label>
        <select id="antiTheft">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select><br /><br />

        <button type="button" onclick="goToStep(1)">← Back</button>
        <button type="button" onclick="goToStep(3)">Save and Continue →</button>
      </div>

      <!-- ===== STEP 3: DRIVERS ===== -->
      <div id="step3" style="display:none;">
        <h2>Tell us about the drivers</h2>

        <label>Gender</label>
        <select id="gender">
          <option value="">-- Select --</option>
          <option value="male">Male</option>
          <option value="female">Female</option>
          <option value="nonbinary">Non-binary / Other</option>
        </select><br /><br />

        <label>Marital Status</label>
        <select id="maritalStatus">
          <option value="">-- Select --</option>
          <option value="single">Single</option>
          <option value="married">Married</option>
          <option value="divorced">Divorced</option>
          <option value="widowed">Widowed</option>
        </select><br /><br />

        <label>Driver's License State</label>
        <select id="licenseState">
          <option value="">-- Select --</option>
          <option value="VA">Virginia</option>
          <option value="TX">Texas</option>
          <option value="TN">Tennessee</option>
          <option value="IN">Indiana</option>
          <option value="IL">Illinois</option>
          <option value="OH">Ohio</option>
          <option value="GA">Georgia</option>
        </select><br /><br />

        <label>Age First Licensed</label>
        <input type="number" id="ageLicensed" placeholder="16" min="14" max="30" /><br /><br />

        <label>Any violations or accidents in the last 5 years?</label>
        <select id="violations">
          <option value="none">None</option>
          <option value="ticket">Speeding Ticket</option>
          <option value="accident">At-Fault Accident</option>
          <option value="dui">DUI / DWI</option>
          <option value="multiple">Multiple Incidents</option>
        </select><br /><br />

        <label>Good student discount? (Under 25 with B average or better)</label>
        <select id="goodStudent">
          <option value="no">No</option>
          <option value="yes">Yes</option>
        </select><br /><br />

        <label>Currently insured?</label>
        <select id="currentlyInsured" onchange="toggleInsuranceFields()">
          <option value="yes">Yes</option>
          <option value="no">No</option>
        </select><br /><br />

        <div id="insuranceFields">
          <label>Current Insurance Carrier</label>
          <input type="text" id="currentCarrier" placeholder="e.g. Geico, State Farm" /><br /><br />

          <label>How long with current carrier?</label>
          <select id="yearsInsured">
            <option value="">-- Select --</option>
            <option value="less1">Less than 1 year</option>
            <option value="1-2">1 – 2 years</option>
            <option value="3-5">3 – 5 years</option>
            <option value="6+">6+ years</option>
          </select><br /><br />
        </div>

        <button type="button" onclick="goToStep(2)">← Back</button>
        <button type="button" onclick="goToStep(4)">Save and Continue →</button>
      </div>

      <!-- ===== STEP 4: YOUR QUOTE ===== -->
      <div id="step4" style="display:none;">
        <h2>Almost there! Contact details</h2>

        <label>Email Address</label>
        <input type="email" id="email" placeholder="you@example.com" /><br /><br />

        <label>Phone Number</label>
        <input type="tel" id="phone" placeholder="(804) 555-1234" /><br /><br />

        <h2>Select Your Coverage</h2>

        <label>Liability Limits</label>
        <select id="liability">
          <option value="25/50">25/50 (State Minimum)</option>
          <option value="50/100">50/100</option>
          <option value="100/300">100/300 (Recommended)</option>
          <option value="250/500">250/500</option>
        </select><br /><br />

        <label>Comprehensive Deductible</label>
        <select id="compDeductible">
          <option value="none">No Coverage</option>
          <option value="250">$250</option>
          <option value="500">$500</option>
          <option value="1000">$1,000</option>
        </select><br /><br />

        <label>Collision Deductible</label>
        <select id="collDeductible">
          <option value="none">No Coverage</option>
          <option value="250">$250</option>
          <option value="500">$500</option>
          <option value="1000">$1,000</option>
        </select><br /><br />

        <label>Roadside Assistance?</label>
        <select id="roadside">
          <option value="no">No</option>
          <option value="yes">Yes (+$5/mo)</option>
        </select><br /><br />

        <label>Rental Car Coverage?</label>
        <select id="rental">
          <option value="no">No</option>
          <option value="yes">Yes (+$4/mo)</option>
        </select><br /><br />

        <button type="button" onclick="goToStep(3)">← Back</button>
        <button type="button" onclick="calculateQuote()">Get My Quote →</button>
      </div>

    </form>

    <!-- Quote Result -->
    <div id="result"></div>

    <script>
      const stepTitles = [
        "", 
        "Step 1 of 4 — Getting Started",
        "Step 2 of 4 — Your Vehicle",
        "Step 3 of 4 — Drivers",
        "Step 4 of 4 — Your Quote"
      ];

      function goToStep(step) {
        // Hide all steps
        document.getElementById("step1").style.display = "none";
        document.getElementById("step2").style.display = "none";
        document.getElementById("step3").style.display = "none";
        document.getElementById("step4").style.display = "none";
        // Show selected step
        document.getElementById("step" + step).style.display = "block";
        document.getElementById("progressText").textContent = stepTitles[step];
        window.scrollTo(0, 0);
      }

      function toggleInsuranceFields() {
        const insured = document.getElementById("currentlyInsured").value;
        document.getElementById("insuranceFields").style.display = 
          insured === "yes" ? "block" : "none";
      }

      function calculateQuote() {
        // Base rate by coverage
        let base = 80;

        // Age factor
        const dob = new Date(document.getElementById("dob").value);
        const age = Math.floor((new Date() - dob) / (365.25 * 24 * 60 * 60 * 1000));
        if (age < 25) base += 40;
        else if (age > 65) base += 15;

        // Violations
        const violations = document.getElementById("violations").value;
        if (violations === "ticket") base += 20;
        else if (violations === "accident") base += 35;
        else if (violations === "dui") base += 75;
        else if (violations === "multiple") base += 90;

        // Home ownership discount
        if (document.getElementById("homeType").value === "own") base -= 10;

        // Vehicle ownership
        const ownership = document.getElementById("vehicleOwnership").value;
        if (ownership === "finance" || ownership === "lease") base += 10;

        // Mileage
        const miles = parseInt(document.getElementById("annualMileage").value) || 10000;
        if (miles > 15000) base += 15;

        // Liability level
        const liability = document.getElementById("liability").value;
        if (liability === "50/100") base += 10;
        else if (liability === "100/300") base += 22;
        else if (liability === "250/500") base += 40;

        // Comp/collision
        const comp = document.getElementById("compDeductible").value;
        const coll = document.getElementById("collDeductible").value;
        if (comp !== "none") base += comp === "250" ? 20 : comp === "500" ? 14 : 8;
        if (coll !== "none") base += coll === "250" ? 25 : coll === "500" ? 18 : 10;

        // Add-ons
        if (document.getElementById("roadside").value === "yes") base += 5;
        if (document.getElementById("rental").value === "yes") base += 4;

        // Anti-theft discount
        if (document.getElementById("antiTheft").value === "yes") base -= 5;

        // Good student discount
        if (document.getElementById("goodStudent").value === "yes") base -= 8;

        const name = document.getElementById("firstName").value || "there";

        document.getElementById("result").innerHTML = `
          <hr />
          <h2>🎉 Your Quote, ${name}!</h2>
          <p><strong>Estimated Monthly Premium:</strong> $${base}.00/mo</p>
          <p><strong>Coverage Selected:</strong> ${document.getElementById("liability").value} Liability</p>
          <p><strong>Vehicle:</strong> ${document.getElementById("vehicleYear").value} 
             ${document.getElementById("vehicleMake").value} 
             ${document.getElementById("vehicleModel").value}</p>
          <p><em>This is a learning demo — not a real insurance quote!</em></p>
        `;
      }
    </script>

  </body>
</html>
